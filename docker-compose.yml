services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    environment:
      SERVICE: backend
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  waf:
    build: .
    depends_on:
      - mongo
      - backend
    environment:
      SERVICE: waf
      WAF_HOST: "0.0.0.0"
      WAF_PORT: "5000"
      BACKEND_URL: "http://backend:8000"
      MONGODB_URI: "mongodb://mongo:27017"
      WAF_SETTINGS_FILE: "/app/waf_settings.json"
      ACTIVE_MODEL_FILE: "${ACTIVE_MODEL_FILE:-predictor_lr.joblib}"
    ports:
      - "5000:5000"
    volumes:
      - ./waf_settings.json:/app/waf_settings.json
      - ./waf/ml_model/waf_text:/app/waf/ml_model/waf_text
      - ./waf/rules/rules.yaml:/app/waf/rules/rules.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build: .
    depends_on:
      - mongo
    environment:
      SERVICE: dashboard
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "5001"
      MONGODB_URI: "mongodb://mongo:27017"
      WAF_SETTINGS_FILE: "/app/waf_settings.json"
      ACTIVE_MODEL_FILE: "${ACTIVE_MODEL_FILE:-predictor_lr.joblib}"
    ports:
      - "5001:5001"
    volumes:
      - ./waf_settings.json:/app/waf_settings.json
      - ./waf/ml_model/waf_text:/app/waf/ml_model/waf_text
      - ./waf/rules/rules.yaml:/app/waf/rules/rules.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
